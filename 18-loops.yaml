- name: install packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: install package
    ansible.builtin.package:
      name: "{{ item.name }}" # Ansible understands by seeing item keyword ,here writing loops with 3 entries so loop 3 items and install these packages.
      state: "{{ item.state }}"
    loop: # list of map
    - { name: "mysql", state: "absent"} # map/dictionary
    - { name: "nginx", state: "present"}
    - { name: "zip", state: "present"}

