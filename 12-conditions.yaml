- name: demo on conditions
  hosts: local
  connection: local
  vars: 
    IS_LIVE: true  # If it is false it will not run output is skipping.
  tasks:
  - name: check live or not
    ansible.builtin.debug:
      msg: "Yes, it is Live"
    when: IS_LIVE # If it is overall true then only it will print msg otherwise skipping.
