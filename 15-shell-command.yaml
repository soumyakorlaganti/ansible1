- name: ansible command vs shell module
  hosts: local
  connection: local
  tasks:
  - name: command module test
    # ansible.builtin.command: cat /etc/passwd | grep root
    ansible.builtin.shell: cat /etc/passwd | grep root
    register: users_output # take the above command output into a variable.

  - name: print output
    ansible.builtin.debug:
      msg: "{{ users_output }}"

  - name: shell module test
    # ansible.builtin.command: cat /etc/passwd | grep root
    ansible.builtin.shell: ls -l > files.txt
    register: files_output # take the above command output into a variable.

  - name: print output of files
    ansible.builtin.debug:
      msg: "{{ files.txt }}"