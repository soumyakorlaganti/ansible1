- name: demo on error handling
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: check user exist or not
    ansible.builtin.command: id roboshop # Using command module here
    register: user_ouput # Execute command and take output
    ignore_errors: true

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ user_ouput }}" 

  - name: create user
    ansible.builtin.command: useradd roboshop
    when: user_ouput.rc !=0